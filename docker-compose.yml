# ============================================
# DEVELOPMENT compose file (active/default).
# No Traefik — services are published directly on localhost so you can hit
# them from the host machine and from the Android emulator (10.0.2.2).
# Source is bind-mounted for hot reload (Nest --watch / Next dev).
#
# Usage:
#   docker compose up --build
#
# For production, use docker-compose.prod.yml instead:
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# ============================================

volumes:
  mongo_data_dev:
  redis_data_dev:

services:
  mongodb:
    image: mongo:7.0
    container_name: tpt_mongodb_dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-tpt_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-devpassword}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: echo 'db.runCommand({ping:1})' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.2-alpine
    container_name: tpt_redis_dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-devpassword} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devpassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: tpt_backend_dev
    restart: unless-stopped
    env_file: .env.dev
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=mongodb://${MONGO_ROOT_USER:-tpt_admin}:${MONGO_ROOT_PASSWORD:-devpassword}@mongodb:27017/tptappdb?authSource=admin
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-devpassword}
      - JWT_SECRET=${JWT_SECRET:-dev_jwt_secret_change_me}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_me}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # Web dev server + Android emulator's host-loopback alias. Mobile
      # requests carry no Origin header at all, so CORS doesn't gate them —
      # see the note on this in CLAUDE.md before adding mobile-specific
      # origins here.
      - FRONTEND_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:3000,http://10.0.2.2:3000
      - LOG_LEVEL=debug
      - LOG_CONSOLE_ENABLED=true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: tpt_frontend_dev
    restart: unless-stopped
    env_file: .env.dev
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
